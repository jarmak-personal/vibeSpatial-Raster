name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.next }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          CURRENT=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          NEXT=$(python3 -c "
          parts = '$CURRENT'.split('.')
          major, minor, patch = int(parts[0]), int(parts[1]), int(parts[2])
          bump = '${{ inputs.bump }}'
          if bump == 'major':
              major += 1; minor = 0; patch = 0
          elif bump == 'minor':
              minor += 1; patch = 0
          else:
              patch += 1
          print(f'{major}.{minor}.{patch}')
          ")
          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "### Version bump: $CURRENT → $NEXT (${{ inputs.bump }})" >> "$GITHUB_STEP_SUMMARY"

      - name: Update version files
        env:
          NEXT: ${{ steps.version.outputs.next }}
          CURRENT: ${{ steps.version.outputs.current }}
        run: |
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEXT\"/" pyproject.toml
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEXT\"/" src/vibespatial/raster/__init__.py
          sed -i "s/^release = \"$CURRENT\"/release = \"$NEXT\"/" docs/conf.py

      - name: Commit and tag
        env:
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Bump version to $NEXT"
          git tag "v$NEXT"
          git push origin main --tags

      - name: Build patch notes from commit subjects
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
          else
            RANGE="HEAD"
          fi
          # First line of each commit, as a markdown bullet list
          NOTES=$(git log --pretty=format:'- %s' "$RANGE" | grep -v '^- Bump version to')
          echo "notes<<NOTES_EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "NOTES_EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT: ${{ steps.version.outputs.next }}
        run: |
          gh release create "v$NEXT" \
            --title "v$NEXT" \
            --notes "${{ steps.notes.outputs.notes }}" \
            --latest

  build:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.release.outputs.version }}
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Build package
        run: uv build
      - name: Verify distributions
        run: |
          ls -lh dist/
          test $(ls dist/*.tar.gz | wc -l) -eq 1
          test $(ls dist/*.whl | wc -l) -eq 1
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  release-assets:
    needs: [release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "v${{ needs.release.outputs.version }}" dist/* --repo "$GITHUB_REPOSITORY"

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
